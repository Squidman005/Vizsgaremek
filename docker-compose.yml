services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: boardgame_users
      MYSQL_USER: backend_user
      MYSQL_PASSWORD: fityiszacicam
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      timeout: 5s
      retries: 10
      interval: 3s

  backend:
    build: ./users
    restart: always
    env_file:
      - ./users/.env
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    build: ./boardgame
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data: